<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static-v2/styles.css">
</head>
<body class="auth-page" data-auth-view="login">
  <div class="page-backdrop" aria-hidden="true"></div>
  <div class="page-grid" aria-hidden="true"></div>
  <div class="page-ambient" aria-hidden="true"></div>

  <main class="auth-shell">
    <div class="auth-brand">
      <div class="auth-orb" aria-hidden="true"></div>
      <h1>AURA</h1>
      <p class="auth-copy">Autonomous Universal Responsive Assistant</p>
    </div>

    <section class="auth-card">
      <p class="eyebrow">Sign in</p>
      <h2>Enter AURA</h2>
      <p class="auth-copy">Sign in to your account and step back into AURA.</p>

      <div class="auth-alert auth-alert--error" id="errorBox"></div>
      <div class="auth-alert auth-alert--success" id="successBox"></div>

      <form class="auth-form" id="loginForm">
        <label class="auth-field">
          <span>Username</span>
          <input id="username" type="text" autocomplete="username" placeholder="Enter your username">
        </label>

        <label class="auth-field">
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" placeholder="Enter your password">
        </label>

        <button class="auth-button" id="submitButton" type="submit">Access AURA</button>
      </form>

      <div class="auth-links">
        <a href="/register">Create account</a>
        <a href="/forgot-password">Forgot password?</a>
      </div>

      <p class="auth-status" id="statusLine">Ready when you are</p>
    </section>
  </main>

  <script src="/static-v2/auth.js"></script>
</body>
</html>
