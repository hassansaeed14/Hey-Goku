<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Your AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a3e, #0a0a1a);
            border-bottom: 1px solid #7c3aed;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 8px;
        }

        .header p {
            color: #a78bfa;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 15px;
            max-width: 75%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .user-message {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .aura-message {
            background: #1a1a3e;
            border: 1px solid #7c3aed33;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .aura-label {
            color: #a78bfa;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .input-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            background: #1a1a3e;
            border: 1px solid #7c3aed;
            border-radius: 30px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder { color: #6b7280; }

        input:focus { border-color: #a78bfa; }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #7c3aed55;
        }

        .typing {
            color: #a78bfa;
            font-style: italic;
            font-size: 0.85rem;
            padding: 5px 20px;
        }

        .orb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #7c3aed, #1a1a3e);
            margin: 10px auto;
            box-shadow: 0 0 30px #7c3aed88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 30px #7c3aed88; }
            50% { box-shadow: 0 0 60px #a78bfa88; }
            100% { box-shadow: 0 0 30px #7c3aed88; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="orb"></div>
        <h1>A U R A</h1>
        <p>AUTONOMOUS UNIVERSAL RESPONSIVE ASSISTANT</p>
    </div>

    <div class="chat-container" id="chat">
        <div class="message aura-message">
            <div class="aura-label">AURA</div>
            Hello! I am AURA, your personal AI assistant. How can I help you today?
        </div>
    </div>

    <div class="input-container">
        <input 
            type="text" 
            id="userInput" 
            placeholder="Ask AURA anything..."
            onkeypress="if(event.key==='Enter') sendMessage()"
        />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `
                <div class="message user-message">${text}</div>
            `;

            input.value = '';
            chat.innerHTML += `<div class="typing" id="typing">AURA is thinking...</div>`;
            chat.scrollTop = chat.scrollHeight;

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            document.getElementById('typing').remove();

            chat.innerHTML += `
                <div class="message aura-message">
                    <div class="aura-label">AURA</div>
                    ${data.response}
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>

</body>
</html>
